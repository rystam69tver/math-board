<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MathBoard Pro - V5</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1f;
            background-image: radial-gradient(#262631 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            font-family: sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }

        /* Эмблема канала: Формула Эйлера */
        .channel-logo {
            position: absolute;
            top: 25px;
            right: 35px;
            color: rgba(255, 255, 255, 0.3); /* Полупрозрачный белый */
            font-size: 26px;
            font-family: 'Times New Roman', Times, serif; /* Классический математический шрифт */
            font-style: italic;
            pointer-events: none;
            user-select: none;
            /* Легкое свечение водяного знака */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .channel-logo sup {
            font-size: 16px;
        }

        .thickness-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(30, 30, 36, 0.6);
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
        }
        input[type=range] {
            accent-color: #555;
            cursor: pointer;
            width: 100px;
            opacity: 0.7;
        }

        .status-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(30, 30, 36, 0.6);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #ffffff;
            box-shadow: 0 0 6px #ffffff;
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

<div class="channel-logo">e<sup>iπ</sup> = -1</div>

<div class="thickness-panel">
    <input type="range" id="thicknessSlider" min="0.3" max="4" step="0.1" value="0.7">
</div>

<div class="status-panel">
    <div id="activeColor" class="color-indicator"></div>
</div>

<canvas id="board"></canvas>

<script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d', { desynchronized: true });
    const colorIndicator = document.getElementById('activeColor');
    const thicknessSlider = document.getElementById('thicknessSlider');

    let isDrawing = false;
    let points = [];
    let historyStack = [];
    
    // Возвращаем деликатный неон
    const config = {
        color: '#ffffff', 
        baseWidth: 0.7,   
        pressureMult: 3,  
        glow: 5           // Оптимальное свечение (не мылит, но светится)
    };

    const colors = {
        'Digit1': '#ffffff', 
        'Digit2': '#ffea00', 
        'Digit3': '#00ffcc', 
        'Digit4': '#ff3366'  
    };

    thicknessSlider.addEventListener('input', (e) => {
        config.baseWidth = parseFloat(e.target.value);
    });

    function resizeCanvas() {
        let tempImg = null;
        if (historyStack.length > 0) {
            tempImg = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowBlur = config.glow;

        if (tempImg) ctx.putImageData(tempImg, 0, 0);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    saveState();

    function saveState() {
        if (historyStack.length > 30) historyStack.shift(); 
        historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    }

    function undo() {
        if (historyStack.length > 1) {
            historyStack.pop(); 
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.putImageData(historyStack[historyStack.length - 1], 0, 0); 
        } else if (historyStack.length === 1) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.putImageData(historyStack[0], 0, 0);
        }
    }

    function changeColor(hex) {
        config.color = hex;
        ctx.strokeStyle = hex;
        ctx.shadowColor = hex;
        colorIndicator.style.backgroundColor = hex;
        colorIndicator.style.boxShadow = `0 0 6px ${hex}`;
    }

    window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.code === 'KeyZ') {
            undo();
        } else if (colors[e.code]) {
            changeColor(colors[e.code]);
        }
    });

    function addPoint(x, y, pressure) {
        const p = (pressure === 0 || pressure === undefined) ? 0.5 : pressure;
        points.push({ x, y, pressure: p });
    }

    canvas.addEventListener('pointerdown', e => {
        if (e.target === thicknessSlider) return;
        if (e.button !== 0 && e.pointerType === 'mouse') return; 
        
        isDrawing = true;
        points = [];
        
        ctx.strokeStyle = config.color;
        ctx.shadowColor = config.color;
        ctx.shadowBlur = config.glow;

        addPoint(e.clientX, e.clientY, e.pressure);
    });

    canvas.addEventListener('pointermove', e => {
        if (!isDrawing) return;
        const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
        for (let event of events) {
            addPoint(event.clientX, event.clientY, event.pressure);
        }
        drawLastSegment();
    });

    canvas.addEventListener('pointerup', (e) => {
        if (isDrawing) {
            isDrawing = false;
            saveState();
        }
    });
    canvas.addEventListener('pointercancel', () => { isDrawing = false; });

    function drawLastSegment() {
        if (points.length < 3) return;

        const p0 = points[points.length - 3];
        const p1 = points[points.length - 2];
        const p2 = points[points.length - 1];

        const mid1 = { x: (p0.x + p1.x) / 2, y: (p0.y + p1.y) / 2 };
        const mid2 = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };

        ctx.lineWidth = config.baseWidth + (p2.pressure * config.pressureMult);

        ctx.beginPath();
        ctx.moveTo(mid1.x, mid1.y);
        ctx.quadraticCurveTo(p1.x, p1.y, mid2.x, mid2.y);
        
        ctx.strokeStyle = config.color; 
        ctx.shadowColor = config.color; 
        ctx.stroke();
    }
</script>

</body>
</html>
