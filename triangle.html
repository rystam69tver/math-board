<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Math Animation - Throw Method (Step 1)</title>
    
    <style>
        :root {
            --neon-mint: #00ffcc;
            --neon-red: #ff0055;
            --bg-dark: #1a1a1f;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            background-image: radial-gradient(#262631 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        .viewport-9-16 {
            position: relative;
            width: 100%;
            max-width: 405px;
            height: 100%;
            margin: 0 auto;
        }

        /* Текст задания (независимый слой) */
        #task-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            font-size: 32px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            line-height: 1.3;
            transition: top 1s cubic-bezier(0.22, 1, 0.36, 1), transform 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Анимация отлета текста наверх (Клик 1) */
        #task-text.slide-up {
            top: 15%;
            transform: translate(-50%, -50%) scale(0.85); /* Чуть уменьшаем заголовок, чтобы не давил */
        }

        .highlight-text {
            color: var(--neon-mint);
            text-shadow: 0 0 15px var(--neon-mint);
        }

        /* Уравнение (независимый слой) */
        #equation-container {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            display: flex;
            align-items: center;
            font-size: 55px;
            white-space: pre;
            font-family: 'Times New Roman', serif;
            font-style: italic; 
            transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Анимация уменьшения уравнения на месте (Клик 1) */
        #equation-container.shrink {
            transform: translate(-50%, -50%) scale(0.85);
        }

        /* Убираем наклон у цифр и знаков */
        #equation-container span, #equation-container div {
            font-style: normal;
        }
        .math-x {
            font-style: italic !important;
        }

        .neon-mint {
            color: var(--neon-mint);
            text-shadow: 0 0 15px var(--neon-mint), 0 0 30px var(--neon-mint);
        }
        
        .neon-red {
            color: var(--neon-red);
            text-shadow: 0 0 15px var(--neon-red), 0 0 30px var(--neon-red);
        }

        /* Элементы для анимации переброски */
        #coeff-a {
            display: inline-block;
            position: relative;
            z-index: 10;
        }

        #mid-part, #coeff-c, #eq-end {
            display: inline-block;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #coeff-c {
            transition: color 0.2s, text-shadow 0.2s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes flyArc {
            0% { transform: translate(0, 0) scale(1); }
            50% { 
                transform: translate(calc(var(--dist) / 2), -150px) scale(1.6) rotate(15deg); 
                color: var(--neon-red); 
                text-shadow: 0 0 20px var(--neon-red);
            }
            100% { transform: translate(var(--dist), 0) scale(1) rotate(0deg); }
        }

    </style>
</head>
<body>

<div class="viewport-9-16">
    <div id="task-text">
        Вычислить с помощью<br>
        <span class="highlight-text">теоремы Виета</span>
    </div>
    
    <div id="equation-container">
        <div id="coeff-a" class="neon-mint">3</div>
        <div id="mid-part"><span class="math-x">x</span>² - 14<span class="math-x">x</span> - </div>
        <div id="coeff-c">5</div>
        <div id="eq-end"> = 0</div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        
        let currentStep = 0;
        const taskText = document.getElementById('task-text');
        const eqContainer = document.getElementById('equation-container');
        
        const coeffA = document.getElementById('coeff-a');
        const midPart = document.getElementById('mid-part');
        const coeffC = document.getElementById('coeff-c');
        const eqEnd = document.getElementById('eq-end');

        function nextAction() {
            if (currentStep === 0) {
                // Клик 1: Текст улетает наверх, уравнение сжимается на месте
                taskText.classList.add('slide-up');
                eqContainer.classList.add('shrink');
                currentStep++;
            } 
            else if (currentStep === 1) {
                // Клик 2: Запускаем полет
                startThrowAnimation();
                currentStep++;
            }
        }

        document.addEventListener('click', nextAction);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowRight') {
                e.preventDefault(); 
                nextAction();
            }
        });

        function startThrowAnimation() {
            // Размеры берутся динамически уже после того, как масштаб изменился
            const rectA = coeffA.getBoundingClientRect();
            const rectC = coeffC.getBoundingClientRect();
            const distX = (rectC.left - rectA.left) * (1 / 0.85); // Компенсируем scale(0.85) родителя
            const shiftX = rectA.width * (1 / 0.85); 

            coeffA.style.setProperty('--dist', `${distX}px`);
            coeffA.style.animation = 'flyArc 1s ease-in-out forwards';

            setTimeout(() => {
                coeffA.style.opacity = '0'; 
                
                coeffC.innerText = '15'; 
                coeffC.classList.add('neon-red'); 
                
                midPart.style.transform = `translateX(-${shiftX}px)`;
                coeffC.style.transform = `translateX(-${shiftX}px)`;
                eqEnd.style.transform = `translateX(-${shiftX}px)`;
            }, 950);
        }
    });
</script>
</body>
</html>
