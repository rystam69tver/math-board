<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Math Animation - Throw Method (Step 1)</title>
    
    <style>
        :root {
            --neon-mint: #00ffcc;
            --neon-red: #ff0055;
            --bg-dark: #1a1a1f;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            background-image: radial-gradient(#262631 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        .viewport-9-16 {
            position: relative;
            width: 100%;
            max-width: 405px;
            height: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        /* Центральный блок, который будет уезжать наверх */
        #center-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            transition: top 1s cubic-bezier(0.22, 1, 0.36, 1), transform 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Класс для сдвига наверх (Клик 1) */
        #center-stage.slide-up {
            top: 15%;
            transform: translate(-50%, 0) scale(0.85); /* Чуть уменьшаем, чтобы освободить место снизу */
        }

        /* Текст задания */
        #task-text {
            font-size: 32px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            line-height: 1.3;
        }

        .highlight-text {
            color: var(--neon-mint);
            text-shadow: 0 0 15px var(--neon-mint);
        }

        /* Уравнение */
        #equation {
            font-size: 55px;
            display: flex;
            align-items: center;
            white-space: pre;
            font-family: 'Times New Roman', serif;
            font-style: italic; 
        }

        /* Убираем наклон у цифр и знаков */
        #equation span, #equation div {
            font-style: normal;
        }
        .math-x {
            font-style: italic !important;
        }

        .neon-mint {
            color: var(--neon-mint);
            text-shadow: 0 0 15px var(--neon-mint), 0 0 30px var(--neon-mint);
        }
        
        .neon-red {
            color: var(--neon-red);
            text-shadow: 0 0 15px var(--neon-red), 0 0 30px var(--neon-red);
        }

        /* Элементы для анимации переброски */
        #coeff-a {
            display: inline-block;
            position: relative;
            z-index: 10;
        }

        #mid-part, #coeff-c, #eq-end {
            display: inline-block;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #coeff-c {
            transition: color 0.2s, text-shadow 0.2s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes flyArc {
            0% { transform: translate(0, 0) scale(1); }
            50% { 
                transform: translate(calc(var(--dist) / 2), -150px) scale(1.6) rotate(15deg); 
                color: var(--neon-red); 
                text-shadow: 0 0 20px var(--neon-red);
            }
            100% { transform: translate(var(--dist), 0) scale(1) rotate(0deg); }
        }

    </style>
</head>
<body>

<div class="viewport-9-16">
    <div id="center-stage">
        <div id="task-text">
            Вычислить с помощью<br>
            <span class="highlight-text">теоремы Виета</span>
        </div>
        
        <div id="equation">
            <div id="coeff-a" class="neon-mint">3</div>
            <div id="mid-part"><span class="math-x">x</span>² - 14<span class="math-x">x</span> - </div>
            <div id="coeff-c">5</div>
            <div id="eq-end"> = 0</div>
        </div>
    </div>
</div>

<script>
    // Ждем полной загрузки HTML перед тем как вешать клики
    document.addEventListener("DOMContentLoaded", () => {
        
        let currentStep = 0;
        const centerStage = document.getElementById('center-stage');
        
        const coeffA = document.getElementById('coeff-a');
        const midPart = document.getElementById('mid-part');
        const coeffC = document.getElementById('coeff-c');
        const eqEnd = document.getElementById('eq-end');

        // Единая функция для переключения шагов
        function nextAction() {
            if (currentStep === 0) {
                // Клик 1: Поднимаем всё наверх
                centerStage.classList.add('slide-up');
                currentStep++;
            } 
            else if (currentStep === 1) {
                // Клик 2: Запускаем полет
                startThrowAnimation();
                currentStep++;
            }
        }

        // Вешаем слушатель на весь документ
        document.addEventListener('click', nextAction);

        // Дублируем на пробел и стрелку вправо
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowRight') {
                e.preventDefault(); // Убираем скролл страницы от пробела
                nextAction();
            }
        });

        function startThrowAnimation() {
            // Считаем дистанцию
            const rectA = coeffA.getBoundingClientRect();
            const rectC = coeffC.getBoundingClientRect();
            const distX = rectC.left - rectA.left;
            const shiftX = rectA.width; 

            // Запускаем полет
            coeffA.style.setProperty('--dist', `${distX}px`);
            coeffA.style.animation = 'flyArc 1s ease-in-out forwards';

            // Момент удара
            setTimeout(() => {
                coeffA.style.opacity = '0'; // Прячем 3
                
                coeffC.innerText = '15'; // Пишем 15
                coeffC.classList.add('neon-red'); // Красная вспышка
                
                // Сдвигаем влево
                midPart.style.transform = `translateX(-${shiftX}px)`;
                coeffC.style.transform = `translateX(-${shiftX}px)`;
                eqEnd.style.transform = `translateX(-${shiftX}px)`;
            }, 950);
        }
    });
</script>
</body>
</html>
