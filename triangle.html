<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Неравенство Треугольника - Полная версия</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #1a1a1d;
            color: #fff; font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; cursor: pointer;
        }
        #scene {
            width: 100vw; height: 100vh; max-width: 600px; max-height: 900px;
            position: relative;
        }
        svg { width: 100%; height: 100%; }

        /* Линии и свечение */
        svg path, svg line { stroke-width: 5; fill: none; stroke-linecap: round; }
        .base-line { stroke: #00ffff; filter: drop-shadow(0 0 8px #00ffff); }
        .leg1-line { stroke: #ffd700; filter: drop-shadow(0 0 8px #ffd700); }
        .leg2-line { stroke: #ff4500; filter: drop-shadow(0 0 8px #ff4500); }
        .success-line { stroke: #00ff00; filter: drop-shadow(0 0 8px #00ff00); }

        /* Следы от циркуля */
        .arc-trace { stroke-width: 3; opacity: 0.5; stroke-dasharray: 600; stroke-dashoffset: 600; }
        .arc1 { stroke: #ffd700; }
        .arc2 { stroke: #ff4500; }
        .arc-success { stroke: #00ff00; }

        /* Анимации рисования */
        .draw { animation: drawing 1.5s ease-out forwards; }
        .draw-fast { stroke-dasharray: 600; stroke-dashoffset: 600; animation: drawing 0.8s ease-out forwards; }
        @keyframes drawing { to { stroke-dashoffset: 0; } }

        /* Анимация вращения (Провал) */
        .fall-right { animation: fallR 1.5s ease-in-out forwards; }
        @keyframes fallR { to { transform: translate(150px, 600px) rotate(90deg); } }
        .fall-left { animation: fallL 1.5s ease-in-out forwards; }
        @keyframes fallL { to { transform: translate(450px, 600px) rotate(-90deg); } }

        /* Анимация букв */
        .label { fill: #fff; font-size: 24px; font-weight: bold; font-family: monospace; transition: opacity 0.5s; }
        .label-large { fill: #fff; font-size: 28px; font-style: italic; font-family: serif; }

        /* Состояния элементов */
        .hidden { visibility: hidden; opacity: 0; transition: opacity 0.8s; pointer-events: none; }
        .visible { visibility: visible; opacity: 1; }
        .fade-out { opacity: 0; transition: opacity 0.5s; }

        /* Формулы */
        #formula-box {
            position: absolute; bottom: 10%; left: 0; width: 100%;
            text-align: center; font-size: 28px;
        }
    </style>
</head>
<body>

<div id="scene">
    <svg viewBox="0 0 600 900">
        <g id="base-group">
            <line x1="150" y1="600" x2="450" y2="600" class="base-line hidden" id="baseLine" stroke-dasharray="300" stroke-dashoffset="300" />
            <text x="290" y="640" class="label hidden" id="label-base-num" style="fill: #00ffff;">4</text>
            <text x="290" y="640" class="label-large hidden" id="label-base-let" style="fill: #00ffff;">c</text>
        </g>

        <g id="fail-scene" class="hidden">
            <g id="leg1-group" transform="translate(150, 600)">
                <line x1="0" y1="0" x2="0" y2="-75" class="leg1-line" />
                <text x="-25" y="-35" class="label" style="fill: #ffd700;">1</text>
            </g>
            <g id="leg2-group" transform="translate(450, 600)">
                <line x1="0" y1="0" x2="0" y2="-150" class="leg2-line" />
                <text x="15" y="-70" class="label" style="fill: #ff4500;">2</text>
            </g>
            <path d="M 150 525 A 75 75 0 0 1 225 600" class="arc-trace arc1 hidden" id="fail-arc1" />
            <path d="M 450 450 A 150 150 0 0 0 300 600" class="arc-trace arc2 hidden" id="fail-arc2" />
        </g>

        <g id="success-scene" class="hidden">
            <path d="M 150 600 A 230 230 0 0 1 380 430" class="arc-trace arc-success hidden" id="succ-arc1" />
            <path d="M 450 600 A 230 230 0 0 0 220 430" class="arc-trace arc-success hidden" id="succ-arc2" />
            
            <line x1="150" y1="600" x2="300" y2="425" class="success-line hidden" id="succ-line1" />
            <line x1="450" y1="600" x2="300" y2="425" class="success-line hidden" id="succ-line2" />
            
            <text x="190" y="500" class="label hidden" id="label-succ1" style="fill: #00ff00;">3</text>
            <text x="390" y="500" class="label hidden" id="label-succ2" style="fill: #00ff00;">3</text>
            
            <text x="190" y="500" class="label-large hidden" id="label-let1" style="fill: #00ff00;">a</text>
            <text x="390" y="500" class="label-large hidden" id="label-let2" style="fill: #00ff00;">b</text>
        </g>
    </svg>

    <div id="formula-box" class="hidden"></div>
</div>

<script>
    let currentStep = 0;
    
    function nextStep() {
        currentStep++;
        
        // ШАГ 1: Появляется база (4)
        if (currentStep === 1) {
            document.getElementById('baseLine').classList.remove('hidden');
            document.getElementById('baseLine').classList.add('draw', 'visible');
            setTimeout(() => document.getElementById('label-base-num').classList.add('visible'), 1000);
        } 
        // ШАГ 2: Вылезают маленькие стороны
        else if (currentStep === 2) {
            document.getElementById('fail-scene').classList.remove('hidden');
            document.getElementById('fail-scene').classList.add('visible');
        } 
        // ШАГ 3: Маленькие стороны падают (не пересекаются)
        else if (currentStep === 3) {
            document.getElementById('leg1-group').classList.add('fall-right');
            document.getElementById('leg2-group').classList.add('fall-left');
            document.getElementById('fail-arc1').classList.remove('hidden');
            document.getElementById('fail-arc1').classList.add('draw', 'visible');
            document.getElementById('fail-arc2').classList.remove('hidden');
            document.getElementById('fail-arc2').classList.add('draw', 'visible');
        }
        // ШАГ 4: Сброс провала, рисуем дуги успеха
        else if (currentStep === 4) {
            document.getElementById('fail-scene').classList.add('fade-out');
            document.getElementById('success-scene').classList.remove('hidden');
            document.getElementById('success-scene').classList.add('visible');
            
            setTimeout(() => {
                document.getElementById('succ-arc1').classList.remove('hidden');
                document.getElementById('succ-arc1').classList.add('draw', 'visible');
                document.getElementById('succ-arc2').classList.remove('hidden');
                document.getElementById('succ-arc2').classList.add('draw', 'visible');
            }, 500);
        }
        // ШАГ 5: Рисуем стороны треугольника в точку пересечения
        else if (currentStep === 5) {
            document.getElementById('succ-line1').classList.remove('hidden');
            document.getElementById('succ-line1').classList.add('draw-fast', 'visible');
            document.getElementById('succ-line2').classList.remove('hidden');
            document.getElementById('succ-line2').classList.add('draw-fast', 'visible');
            
            setTimeout(() => {
                document.getElementById('label-succ1').classList.add('visible');
                document.getElementById('label-succ2').classList.add('visible');
            }, 800);
        }
        // ШАГ 6: Превращение в общее правило (цифры -> буквы)
        else if (currentStep === 6) {
            // Прячем дуги и цифры
            document.getElementById('succ-arc1').classList.add('fade-out');
            document.getElementById('succ-arc2').classList.add('fade-out');
            document.getElementById('label-base-num').classList.add('hidden');
            document.getElementById('label-succ1').classList.add('hidden');
            document.getElementById('label-succ2').classList.add('hidden');
            
            // Показываем буквы a, b, c
            setTimeout(() => {
                document.getElementById('label-base-let').classList.remove('hidden');
                document.getElementById('label-base-let').classList.add('visible');
                document.getElementById('label-let1').classList.remove('hidden');
                document.getElementById('label-let1').classList.add('visible');
                document.getElementById('label-let2').classList.remove('hidden');
                document.getElementById('label-let2').classList.add('visible');
            }, 300);
        }
        // ШАГ 7: Вывод формулы KaTeX
        else if (currentStep === 7) {
            const formulaBox = document.getElementById('formula-box');
            katex.render("c < a + b", formulaBox, { throwOnError: false });
            formulaBox.classList.remove('hidden');
            formulaBox.classList.add('visible');
        }
    }

    document.body.addEventListener('click', nextStep);
    document.addEventListener('keydown', (e) => { if (e.code === 'Space') nextStep(); });
</script>

</body>
</html>
