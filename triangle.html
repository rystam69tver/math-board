<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Math Animation - Throw Method (Full)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-mint: #00ffcc;
            --neon-red: #ff0055;
            --neon-yellow: #ffea00; 
            --bg-dark: #1a1a1f;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            background-image: radial-gradient(#262631 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        .viewport-9-16 {
            position: relative;
            width: 100%;
            max-width: 405px;
            height: 100%;
            margin: 0 auto;
        }

        /* 1. Текст задания */
        #task-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            font-family: 'Montserrat', sans-serif; 
            font-size: 30px;
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            text-align: center;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            line-height: 1.4;
            transition: top 1s cubic-bezier(0.22, 1, 0.36, 1), transform 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #task-text.slide-up {
            top: 12%;
            transform: translate(-50%, -50%) scale(0.8); 
        }

        .highlight-text {
            color: var(--neon-mint);
            text-shadow: 0 0 15px var(--neon-mint);
            font-size: 34px; 
        }

        /* 2. Уравнение */
        #equation-container {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            display: flex;
            align-items: center;
            font-size: 55px;
            white-space: pre;
            font-family: 'Times New Roman', serif;
            font-style: italic; 
            transition: top 1s cubic-bezier(0.22, 1, 0.36, 1), transform 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #equation-container.shrink { transform: translate(-50%, -50%) scale(0.85); }
        #equation-container.slide-up-more { top: 25%; transform: translate(-50%, -50%) scale(0.85); }

        #equation-container span, #equation-container div { font-style: normal; }
        .math-x { font-style: italic !important; }

        .neon-mint { color: var(--neon-mint); text-shadow: 0 0 15px var(--neon-mint), 0 0 30px var(--neon-mint); }
        .neon-red { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red), 0 0 30px var(--neon-red); }
        .neon-yellow { color: var(--neon-yellow); text-shadow: 0 0 15px var(--neon-yellow), 0 0 30px var(--neon-yellow); }

        #coeff-a { display: inline-block; position: relative; z-index: 10; }
        #mid-part, #coeff-c, #eq-end { display: inline-block; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #coeff-c { transition: color 0.2s, text-shadow 0.2s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @keyframes flyArc {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(calc(var(--dist) / 2), -150px) scale(1.6) rotate(15deg); color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red); }
            100% { transform: translate(var(--dist), 0) scale(1) rotate(0deg); }
        }

        /* 3. Блок формул Виета */
        #vieta-block {
            position: absolute;
            top: 35%;
            right: -600px; /* Убрали далеко-далеко за экран */
            opacity: 0;
            font-size: 28px;
            font-family: 'Times New Roman', serif;
            color: var(--neon-yellow);
            text-shadow: 0 0 10px rgba(255, 234, 0, 0.3);
            /* Замедлили анимацию до 1.5 секунд */
            transition: all 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 5;
        }

        #vieta-block.visible {
            right: 20px; 
            opacity: 1;
        }

        .system-plate {
            background: rgba(30, 30, 35, 0.7); 
            border: 1px solid rgba(255, 234, 0, 0.15); 
            border-left: 4px solid var(--neon-yellow); 
            border-radius: 12px;
            padding: 15px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 234, 0, 0.05); 
            backdrop-filter: blur(8px); 
            line-height: 1.5;
        }

        /* 4. Блок подбора корней */
        #factoring-block {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            font-size: 32px;
            font-family: 'Times New Roman', serif;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
            line-height: 1.5;
        }
        #factoring-block.visible { opacity: 1; transform: translateY(0); }

        /* 5. Итоговые корни и дроби */
        #roots-container {
            position: absolute;
            top: 67%;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 45px;
            font-family: 'Times New Roman', serif;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #roots-container.visible { opacity: 1; transform: scale(1); }

        .root-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .root-top { font-style: italic; }
        .root-top span { font-style: normal; }

        .fraction-line {
            width: 100%;
            height: 4px;
            background-color: var(--neon-mint);
            box-shadow: 0 0 10px var(--neon-mint);
            margin: 5px 0;
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }
        .fraction-line.draw { transform: scaleX(1); }

        .denominator {
            font-style: normal;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
        }
        .denominator.drop { opacity: 1; transform: translateY(0); }

        /* 6. Финальные ответы */
        #final-answers {
            position: absolute;
            top: 86%;
            width: 100%;
            text-align: center;
            font-size: 55px;
            font-family: 'Times New Roman', serif;
            font-style: italic;
            opacity: 0;
            transform: translateY(20px) scale(0.8);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #final-answers.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    </style>
</head>
<body>

<div class="viewport-9-16">
    <div id="task-text">
        Вычислить с помощью<br>
        <span class="highlight-text">теоремы Виета</span>
    </div>
    
    <div id="equation-container">
        <div id="coeff-a" class="neon-mint">3</div>
        <div id="mid-part"><span class="math-x">x</span>² - 14<span class="math-x">x</span> - </div>
        <div id="coeff-c">5</div>
        <div id="eq-end"> = 0</div>
    </div>

    <div id="vieta-block">
        <div class="system-plate">
            <i>x₁</i> · <i>x₂</i> = -15<br>
            <i>x₁</i> + <i>x₂</i> = 14
        </div>
    </div>

    <div id="factoring-block">
        <span class="neon-yellow">15</span> · (<span class="neon-yellow">-1</span>) = -15<br>
        <span class="neon-yellow">15</span> + (<span class="neon-yellow">-1</span>) = 14
    </div>

    <div id="roots-container" class="neon-mint">
        <div class="root-group">
            <div class="root-top"><i>x₁</i> = <span>15</span></div>
            <div class="fraction-line"></div>
            <div class="denominator">3</div>
        </div>
        <div class="root-group">
            <div class="root-top"><i>x₂</i> = <span>-1</span></div>
            <div class="fraction-line"></div>
            <div class="denominator">3</div>
        </div>
    </div>

    <div id="final-answers" class="neon-yellow">
        <i>x₁</i> = 5, <i>x₂</i> = -⅓
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        let currentStep = 0;
        
        const taskText = document.getElementById('task-text');
        const eqContainer = document.getElementById('equation-container');
        const coeffA = document.getElementById('coeff-a');
        const midPart = document.getElementById('mid-part');
        const coeffC = document.getElementById('coeff-c');
        const eqEnd = document.getElementById('eq-end');

        function nextAction() {
            if (currentStep === 0) {
                // Клик 1: Текст улетает, уравнение сжимается
                taskText.classList.add('slide-up');
                eqContainer.classList.add('shrink');
                currentStep++;
            } 
            else if (currentStep === 1) {
                // Клик 2: Переброска
                startThrowAnimation();
                currentStep++;
            }
            else if (currentStep === 2) {
                // Клик 3: Уравнение вверх, выезжает табличка (медленно)
                eqContainer.classList.add('slide-up-more');
                document.getElementById('vieta-block').classList.add('visible');
                
                // Подбор множителей появляется чуть позже таблички
                setTimeout(() => {
                    document.getElementById('factoring-block').classList.add('visible');
                }, 1200);
                
                currentStep++;
            }
            else if (currentStep === 3) {
                // Клик 4: Всплывают промежуточные корни 15 и -1
                document.getElementById('roots-container').classList.add('visible');
                currentStep++;
            }
            else if (currentStep === 4) {
                // Клик 5: Возврат долга (чертим дроби, роняем тройки)
                const lines = document.querySelectorAll('.fraction-line');
                const denoms = document.querySelectorAll('.denominator');
                
                lines.forEach(line => line.classList.add('draw'));
                setTimeout(() => {
                    denoms.forEach(denom => denom.classList.add('drop'));
                }, 300);
                
                currentStep++;
            }
            else if (currentStep === 5) {
                // Клик 6: Финальный ответ
                document.getElementById('final-answers').classList.add('visible');
                currentStep++;
            }
        }

        document.addEventListener('click', nextAction);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowRight') {
                e.preventDefault(); 
                nextAction();
            }
        });

        function startThrowAnimation() {
            const rectA = coeffA.getBoundingClientRect();
            const rectC = coeffC.getBoundingClientRect();
            const distX = (rectC.left - rectA.left) * (1 / 0.85); 
            const shiftX = rectA.width * (1 / 0.85); 

            coeffA.style.setProperty('--dist', `${distX}px`);
            coeffA.style.animation = 'flyArc 1s ease-in-out forwards';

            setTimeout(() => {
                coeffA.style.opacity = '0'; 
                coeffC.innerText = '15'; 
                coeffC.classList.add('neon-red'); 
                midPart.style.transform = `translateX(-${shiftX}px)`;
                coeffC.style.transform = `translateX(-${shiftX}px)`;
                eqEnd.style.transform = `translateX(-${shiftX}px)`;
            }, 950);
        }
    });
</script>
</body>
</html>
