<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Math Animation - Throw Method (Steps 1-3)</title>
    
    <style>
        :root {
            --neon-mint: #00ffcc;
            --neon-red: #ff0055;
            --neon-yellow: #ffea00; /* Добавили желтый для правил */
            --bg-dark: #1a1a1f;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            background-image: radial-gradient(#262631 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        .viewport-9-16 {
            position: relative;
            width: 100%;
            max-width: 405px;
            height: 100%;
            margin: 0 auto;
        }

        /* 1. Текст задания */
        #task-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            font-size: 32px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            line-height: 1.3;
            transition: top 1s cubic-bezier(0.22, 1, 0.36, 1), transform 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #task-text.slide-up {
            top: 12%;
            transform: translate(-50%, -50%) scale(0.85); 
        }

        .highlight-text {
            color: var(--neon-mint);
            text-shadow: 0 0 15px var(--neon-mint);
        }

        /* 2. Уравнение */
        #equation-container {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            display: flex;
            align-items: center;
            font-size: 55px;
            white-space: pre;
            font-family: 'Times New Roman', serif;
            font-style: italic; 
            transition: top 1s cubic-bezier(0.22, 1, 0.36, 1), transform 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #equation-container.shrink {
            transform: translate(-50%, -50%) scale(0.85);
        }

        /* Новый класс для подъема уравнения к заголовку (Клик 3) */
        #equation-container.slide-up-more {
            top: 25%; /* Оставляет идеальный зазор в пару сантиметров от заголовка */
            transform: translate(-50%, -50%) scale(0.85);
        }

        #equation-container span, #equation-container div { font-style: normal; }
        .math-x { font-style: italic !important; }

        .neon-mint { color: var(--neon-mint); text-shadow: 0 0 15px var(--neon-mint), 0 0 30px var(--neon-mint); }
        .neon-red { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red), 0 0 30px var(--neon-red); }
        .neon-yellow { color: var(--neon-yellow); text-shadow: 0 0 15px var(--neon-yellow), 0 0 30px var(--neon-yellow); }

        /* Элементы для анимации переброски */
        #coeff-a { display: inline-block; position: relative; z-index: 10; }
        #mid-part, #coeff-c, #eq-end { display: inline-block; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #coeff-c { transition: color 0.2s, text-shadow 0.2s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @keyframes flyArc {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(calc(var(--dist) / 2), -150px) scale(1.6) rotate(15deg); color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red); }
            100% { transform: translate(var(--dist), 0) scale(1) rotate(0deg); }
        }

        /* 3. Блок формул Виета (справа) */
        #vieta-block {
            position: absolute;
            top: 36%;
            right: -200px; /* Спрятано за экраном */
            opacity: 0;
            font-size: 28px;
            font-family: 'Times New Roman', serif;
            color: var(--neon-yellow);
            text-shadow: 0 0 10px rgba(255, 234, 0, 0.5);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #vieta-block.visible {
            right: 30px; /* Выезжает в правую часть экрана */
            opacity: 1;
        }

        /* Имитация фигурной скобки системы уравнений */
        .system-brace {
            border-left: 3px solid var(--neon-yellow);
            padding-left: 15px;
            box-shadow: -5px 0 15px -5px var(--neon-yellow);
            line-height: 1.4;
        }

        /* 4. Блок подбора корней (по центру) */
        #factoring-block {
            position: absolute;
            top: 52%;
            width: 100%;
            text-align: center;
            font-size: 35px;
            font-family: 'Times New Roman', serif;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
            line-height: 1.5;
        }

        #factoring-block.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 5. Итоговые корни */
        #roots-block {
            position: absolute;
            top: 72%;
            width: 100%;
            text-align: center;
            font-size: 50px;
            font-family: 'Times New Roman', serif;
            font-style: italic;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #roots-block.visible {
            opacity: 1;
            transform: scale(1);
        }

    </style>
</head>
<body>

<div class="viewport-9-16">
    <div id="task-text">
        Вычислить с помощью<br>
        <span class="highlight-text">теоремы Виета</span>
    </div>
    
    <div id="equation-container">
        <div id="coeff-a" class="neon-mint">3</div>
        <div id="mid-part"><span class="math-x">x</span>² - 14<span class="math-x">x</span> - </div>
        <div id="coeff-c">5</div>
        <div id="eq-end"> = 0</div>
    </div>

    <div id="vieta-block">
        <div class="system-brace">
            <i>x₁</i> · <i>x₂</i> = -15<br>
            <i>x₁</i> + <i>x₂</i> = 14
        </div>
    </div>

    <div id="factoring-block">
        <span class="neon-yellow">15</span> · (<span class="neon-yellow">-1</span>) = -15<br>
        <span class="neon-yellow">15</span> + (<span class="neon-yellow">-1</span>) = 14
    </div>

    <div id="roots-block" class="neon-mint">
        <i>x₁</i> = 15,  <i>x₂</i> = -1
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        
        let currentStep = 0;
        const taskText = document.getElementById('task-text');
        const eqContainer = document.getElementById('equation-container');
        
        const coeffA = document.getElementById('coeff-a');
        const midPart = document.getElementById('mid-part');
        const coeffC = document.getElementById('coeff-c');
        const eqEnd = document.getElementById('eq-end');

        function nextAction() {
            if (currentStep === 0) {
                // Клик 1: Текст улетает наверх, уравнение сжимается на месте
                taskText.classList.add('slide-up');
                eqContainer.classList.add('shrink');
                currentStep++;
            } 
            else if (currentStep === 1) {
                // Клик 2: Запускаем полет
                startThrowAnimation();
                currentStep++;
            }
            else if (currentStep === 2) {
                // Клик 3: Уравнение едет наверх, выезжает теорема Виета
                eqContainer.classList.add('slide-up-more');
                document.getElementById('vieta-block').classList.add('visible');
                
                // Автоматически через 1 секунду показываем процесс подбора множителей
                setTimeout(() => {
                    document.getElementById('factoring-block').classList.add('visible');
                }, 1000);
                
                currentStep++;
            }
            else if (currentStep === 3) {
                // Клик 4: Вспыхивают готовые корни
                document.getElementById('roots-block').classList.add('visible');
                currentStep++;
            }
        }

        document.addEventListener('click', nextAction);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowRight') {
                e.preventDefault(); 
                nextAction();
            }
        });

        function startThrowAnimation() {
            const rectA = coeffA.getBoundingClientRect();
            const rectC = coeffC.getBoundingClientRect();
            const distX = (rectC.left - rectA.left) * (1 / 0.85); 
            const shiftX = rectA.width * (1 / 0.85); 

            coeffA.style.setProperty('--dist', `${distX}px`);
            coeffA.style.animation = 'flyArc 1s ease-in-out forwards';

            setTimeout(() => {
                coeffA.style.opacity = '0'; 
                
                coeffC.innerText = '15'; 
                coeffC.classList.add('neon-red'); 
                
                midPart.style.transform = `translateX(-${shiftX}px)`;
                coeffC.style.transform = `translateX(-${shiftX}px)`;
                eqEnd.style.transform = `translateX(-${shiftX}px)`;
            }, 950);
        }
    });
</script>
</body>
</html>
