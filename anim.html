<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Math Animation - LaTeX Edition</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1f;
            background-image: radial-gradient(#262631 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #ffffff;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        .math-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: 60px;
        }

        .step {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease-out;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .step.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="math-container">
    <div class="step" id="step0">$$ \text{Вычислить: } \sqrt{65^2 - 56^2} $$</div>
    <div class="step" id="step1">$$ = \sqrt{\textcolor{#ffea00}{(65 - 56)(65 + 56)}} $$</div>
    <div class="step" id="step2">$$ = \sqrt{9 \cdot 121} $$</div>
    <div class="step" id="step3">$$ = 3 \cdot 11 $$</div>
    <div class="step" id="step4">$$ = \textcolor{#00ffcc}{33} $$</div>
</div>

<script>
    // 1. Ждем полной загрузки DOM, затем рендерим LaTeX
    document.addEventListener("DOMContentLoaded", () => {
        renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false 
        });
    });

    // 2. Логика пошагового появления
    let currentStep = 0;
    const totalSteps = 5;
    
    window.addEventListener('click', () => {
        if (currentStep < totalSteps) {
            document.getElementById('step' + currentStep).classList.add('active');
            currentStep++;
        }
    });
    
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowRight') {
            window.dispatchEvent(new Event('click'));
        }
    });
</script>
</body>
</html>
