<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Math Animation - Pro Shorts Edition</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <style>
        :root {
            --neon-mint: #00ffcc;
            --neon-yellow: #ffea00;
            --bg-dark: #1a1a1f;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg-dark);
            background-image: radial-gradient(#262631 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        .viewport-9-16 {
            position: relative;
            width: 100%;
            max-width: 405px;
            height: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        #task-header {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: top left;
            transition: top 1.2s cubic-bezier(0.22, 1, 0.36, 1),
                        left 1.2s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 1.2s cubic-bezier(0.22, 1, 0.36, 1),
                        opacity 1.2s ease;
            font-size: 45px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            z-index: 10;
        }

        #task-header.minimized {
            top: 60px;
            left: 20px;
            transform: translate(0, 0) scale(0.55);
            opacity: 0.8;
        }

        .steps-container {
            margin-top: 120px; /* Подняли блок с решением выше */
            display: flex;
            flex-direction: column;
            gap: 0px; /* Убрали лишнее расстояние между строками */
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .step {
            opacity: 0;
            transform: translateY(30px); /* Уменьшили размах выплывания, чтобы было аккуратнее */
            transition: all 1.5s cubic-bezier(0.22, 1, 0.36, 1); 
            font-size: 38px;
        }

        .step.active {
            opacity: 1;
            transform: translateY(0);
        }

        .euler-mark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            opacity: 0.3;
            color: var(--neon-mint);
        }
    </style>
</head>
<body>

<div class="viewport-9-16">
    <div id="task-header">
        $$ \text{Вычислить: } \sqrt{65^2 - 56^2} $$
    </div>

    <div class="steps-container">
        <div class="step" id="step1">$$ = \sqrt{\textcolor{#ffea00}{(65 - 56)(65 + 56)}} $$</div>
        <div class="step" id="step2">$$ = \sqrt{9 \cdot 121} $$</div>
        <div class="step" id="step3">$$ = 3 \cdot 11 $$</div>
        <div class="step" id="step4">$$ = \textcolor{#00ffcc}{33} $$</div>
    </div>

    <div class="euler-mark">$$ e^{i\pi} + 1 = 0 $$</div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false 
        });
    });

    let currentStep = 0;
    const taskHeader = document.getElementById('task-header');
    const totalSteps = 4;

    window.addEventListener('click', () => {
        if (currentStep === 0) {
            taskHeader.classList.add('minimized');
            setTimeout(() => {
                showNextStep();
            }, 600);
        } else {
            showNextStep();
        }
    });

    function showNextStep() {
        if (currentStep < totalSteps) {
            currentStep++;
            const step = document.getElementById('step' + currentStep);
            if (step) step.classList.add('active');
        }
    }
    
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowRight') window.dispatchEvent(new Event('click'));
    });
</script>
</body>
</html>
