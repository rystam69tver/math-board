<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Math Animation Pro</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1f;
            /* Наша фирменная сетка */
            background-image: radial-gradient(#262631 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            color: #ffffff;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        /* Контейнер для центрирования всей математики */
        .math-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            font-size: 45px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* Базовый стиль для каждой строки */
        .step {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); /* Элегантная плавная скорость */
            display: flex;
            align-items: center;
        }

        /* Когда шаг становится активным */
        .step.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Стиль для акцентов (лайфхак) */
        .highlight {
            color: #ffea00; /* Наш фирменный желтый */
            text-shadow: 0 0 20px rgba(255, 234, 0, 0.4);
            font-weight: bold;
        }

        /* Стиль для финального ответа */
        .final-answer {
            color: #00ffcc; /* Наш фирменный мятный */
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.5);
            font-size: 55px;
            font-weight: bold;
        }

        sup { font-size: 25px; }

        /* Индикатор кликов на старте */
        .hint {
            position: absolute;
            bottom: 30px;
            font-family: sans-serif;
            font-style: normal;
            font-size: 14px;
            color: #444455;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div class="math-container">
    <div class="step" id="step0">Вычислить: &nbsp; <b><span style="color: #ffffff;">√</span><span style="text-decoration: overline;">65<sup>2</sup> - 56<sup>2</sup></span></b></div>
    
    <div class="step" id="step1">= &nbsp; √<span style="text-decoration: overline;"><span class="highlight">(65 - 56)</span><span class="highlight">(65 + 56)</span></span></div>
    
    <div class="step" id="step2">= &nbsp; √<span style="text-decoration: overline;">9 · 121</span></div>
    
    <div class="step" id="step3">= &nbsp; 3 · 11</div>
    
    <div class="step" id="step4">= &nbsp; <span class="final-answer">33</span></div>
</div>

<div class="hint" id="hint">Кликни мышкой или нажми Пробел, чтобы показать следующий шаг</div>

<script>
    let currentStep = 0;
    const totalSteps = 5;
    const hint = document.getElementById('hint');

    function nextStep() {
        if (currentStep < totalSteps) {
            // Гасим подсказку при первом клике
            if (currentStep === 0) hint.style.opacity = '0';
            
            // Активируем текущую строку
            document.getElementById('step' + currentStep).classList.add('active');
            currentStep++;
        }
    }

    // Запуск по клику на экран или по кнопкам клавиатуры
    window.addEventListener('click', nextStep);
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowRight') {
            nextStep();
        }
    });
</script>

</body>
</html>
