<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Math Animation Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Lora:italic,wght@1,500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #16161a;
            background-image: radial-gradient(#24242e 1.5px, transparent 1.5px);
            background-size: 35px 35px;
            color: #ffffff;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        .math-container {
            display: flex;
            flex-direction: column;
            gap: 35px;
            /* Шрифт Lora для букв, Montserrat для цифр через CSS-настройку */
            font-family: 'Lora', serif;
            font-size: 52px;
            letter-spacing: 1px;
        }

        .step {
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: all 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .step.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Цифры будут более современными */
        .num { font-family: 'Montserrat', sans-serif; font-style: normal; }

        .highlight {
            color: #fbbf24;
            text-shadow: 0 0 25px rgba(251, 191, 36, 0.4);
        }

        .final-answer {
            color: #22d3ee;
            font-size: 68px;
            font-weight: bold;
            text-shadow: 0 0 35px rgba(34, 211, 238, 0.6);
        }

        .root-symbol { font-family: sans-serif; font-style: normal; font-size: 65px; margin-right: -5px; }
        .overline { text-decoration: overline; text-underline-offset: 5px; }
        sup { font-family: 'Montserrat', sans-serif; font-size: 28px; font-style: normal; }
    </style>
</head>
<body>

<div class="math-container">
    <div class="step" id="step0">Вычислить: &nbsp; <span class="root-symbol">√</span><span class="overline"><span class="num">65</span><sup>2</sup> - <span class="num">56</span><sup>2</sup></span></div>
    
    <div class="step" id="step1">= &nbsp; <span class="root-symbol">√</span><span class="overline"><span class="highlight">(<span class="num">65</span> - <span class="num">56</span>)</span><span class="highlight">(<span class="num">65</span> + <span class="num">56</span>)</span></span></div>
    
    <div class="step" id="step2">= &nbsp; <span class="root-symbol">√</span><span class="overline"><span class="num">9 · 121</span></span></div>
    
    <div class="step" id="step3">= &nbsp; <span class="num">3 · 11</span></div>
    
    <div class="step" id="step4">= &nbsp; <span class="num final-answer">33</span></div>
</div>

<script>
    let currentStep = 0;
    const totalSteps = 5;
    window.addEventListener('click', () => {
        if (currentStep < totalSteps) {
            document.getElementById('step' + currentStep).classList.add('active');
            currentStep++;
        }
    });
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') window.dispatchEvent(new Event('click')); });
</script>
</body>
</html>
