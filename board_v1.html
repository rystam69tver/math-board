<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MathBoard Pro - V1</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* Эстетичный темный фон с точечной сеткой */
            background-color: #1a1a1f;
            background-image: radial-gradient(#3a3a45 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            font-family: sans-serif;
            touch-action: none; /* Блокируем скролл браузера при рисовании стилусом */
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        .status-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #555566;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<canvas id="board"></canvas>
<div class="status-panel">Движок: Кривые Безье | Нажатие: Активно</div>

<script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d', { desynchronized: true }); // Уменьшает задержку ввода

    let isDrawing = false;
    let points = [];
    
    // Настройки пера
    const config = {
        color: '#00ffcc', // Неоновый мятный
        baseWidth: 3,     // Базовая толщина
        glow: 8           // Сила свечения
    };

    // Адаптация под экраны с высоким разрешением (чтобы не было пикселей)
    function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowColor = config.color;
        ctx.shadowBlur = config.glow;
        ctx.strokeStyle = config.color;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Захват точек с учетом силы нажатия стилуса
    function addPoint(x, y, pressure) {
        // Если устройство не передает силу нажатия (например, мышь), ставим дефолтное значение 0.5
        const p = (pressure === 0 || pressure === undefined) ? 0.5 : pressure;
        points.push({ x, y, pressure: p });
    }

    canvas.addEventListener('pointerdown', e => {
        isDrawing = true;
        points = [];
        addPoint(e.clientX, e.clientY, e.pressure);
    });

    canvas.addEventListener('pointermove', e => {
        if (!isDrawing) return;
        
        // Coalesced events (для планшетов с высокой частотой опроса пера)
        const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
        for (let event of events) {
            addPoint(event.clientX, event.clientY, event.pressure);
        }
        drawLastSegment();
    });

    canvas.addEventListener('pointerup', () => isDrawing = false);
    canvas.addEventListener('pointercancel', () => isDrawing = false);

    // Алгоритм отрисовки плавных кривых
    function drawLastSegment() {
        if (points.length < 3) return;

        const p0 = points[points.length - 3];
        const p1 = points[points.length - 2];
        const p2 = points[points.length - 1];

        // Вычисляем средние точки для плавного соединения кривых Безье
        const mid1 = { x: (p0.x + p1.x) / 2, y: (p0.y + p1.y) / 2 };
        const mid2 = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };

        // Динамическая толщина линии на основе силы нажатия
        ctx.lineWidth = config.baseWidth + (p2.pressure * 4);

        ctx.beginPath();
        ctx.moveTo(mid1.x, mid1.y);
        ctx.quadraticCurveTo(p1.x, p1.y, mid2.x, mid2.y);
        ctx.stroke();
    }
</script>

</body>
</html>
